<div style="padding: 20px; font-family: Arial;">
  <header style="display: flex; justify-content: space-between; background: #4a6cf7; color: white; padding: 15px;">
    <h2>Quantity Measurement</h2>
    <button (click)="logout()" style="background: white; color: #4a6cf7; border: none; padding: 5px 15px; cursor: pointer;">Logout</button>
  </header>

  <main style="max-width: 800px; margin: 20px auto; background: #f9f9f9; padding: 20px; border-radius: 8px;">
    
    <h3>Choose Type</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button *ngFor="let t of types" 
              (click)="setType(t)"
              [style.background]="currentType === (t.toUpperCase() + 'UNIT') ? '#4a6cf7' : 'white'"
              [style.color]="currentType === (t.toUpperCase() + 'UNIT') ? 'white' : 'black'"
              style="padding: 10px 20px; border: 1px solid #ccc; cursor: pointer;">
        {{ t }}
      </button>
    </div>

    <h3>Choose Action</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button *ngFor="let a of actions" 
              (click)="setAction(a)"
              [style.background]="currentAction === (a === 'Comparison' ? 'COMPARE' : a === 'Conversion' ? 'CONVERT' : 'ADD') ? '#4a6cf7' : 'white'"
              [style.color]="currentAction === (a === 'Comparison' ? 'COMPARE' : a === 'Conversion' ? 'CONVERT' : 'ADD') ? 'white' : 'black'"
              style="padding: 10px 20px; border: 1px solid #ccc; cursor: pointer;">
        {{ a }}
      </button>
    </div>

    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
      <div>
        <label>Value 1</label><br>
        <input type="number" [(ngModel)]="val1" style="padding: 8px; width: 100px;">
        <select [(ngModel)]="unit1" style="padding: 8px;">
          <option *ngFor="let u of availableUnits" [value]="u">{{ u }}</option>
        </select>
      </div>

      <div *ngIf="currentAction !== 'CONVERT'">
        <label>Value 2</label><br>
        <input type="number" [(ngModel)]="val2" style="padding: 8px; width: 100px;">
        <select [(ngModel)]="unit2" style="padding: 8px;">
          <option *ngFor="let u of availableUnits" [value]="u">{{ u }}</option>
        </select>
      </div>
      <div *ngIf="currentAction === 'CONVERT'">
        <label>Convert To:</label><br>
        <select [(ngModel)]="unit2" style="padding: 8px;">
          <option *ngFor="let u of availableUnits" [value]="u">{{ u }}</option>
        </select>
      </div>
    </div>

    <button (click)="calculate()" style="padding: 10px 20px; background: #4a6cf7; color: white; border: none; cursor: pointer;">
      Calculate Result
    </button>

    <h2 style="margin-top: 20px;">{{ resultDisplay }}</h2>
    <p *ngIf="errorMessage" style="color: red;">Error: {{ errorMessage }}</p>

  </main>
</div>
