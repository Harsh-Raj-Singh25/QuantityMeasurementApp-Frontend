<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Quantity Measurement</title>
        <link rel="stylesheet" href="C:\Users\HP5CD\Desktop\QuantityMeasurementApp-frontend\CSS\DashBoard.css">
    </head>
    <body>
        <header>
            <h1>Welcome to Quantity Measurement</h1>
        </header>
    <main>
        <!--Type selection-->
        <section class="types">
            <h3>Choose Type</h3>
            <div class="type-container">
                <div class="card active">Length</div>
                <div class="card">Weight</div>
                <div class="card">Temperature</div>
                <div class="card">Volume</div>
            </div>
        </section>
        <!--Action Selection-->
        <section class="actions">
            <h3>Choose Action</h3>
            <div class="action-container">
                <button class="active">Comparison</button>
                <button>Conversion</button>
                <button>Arithmetic</button>
            </div>
        </section>

        <!--Input section-->
        <section class="inputs">
            <div class="input-box">
                <input type="number" placeholder="Value 1">
                <select>
                    <option>Kilometer</option>
                    <option>Meter</option>
                    <option>Feet</option>
                    <option>Inches</option>
                    <option>Centimeter</option>
                </select>
            </div>

            <div class="input-box">
                <input type="number" placeholder="Value 2">
                <select>
                    <option>Meter</option>
                    <option>Kilometer</option>
                    <option>Feet</option>
                    <option>Inches</option>
                    <option>Centimeter</option>
                </select>
            </div>
        </section>
        <!-- Result -->
        <section class="result">
             <h2>Result: 0</h2>
        </section>

    </main>    
    </body>
</html>
