<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth Page - Quantity Measurement</title>
  <link rel="stylesheet" href="./CSS/LoginSignUp.css">
</head>
<body>
<div class="container">
  <div class="left">
    <h2>Quantity Measurement App</h2>
    <img src="C:\Users\HP5CD\Desktop\QuantityMeasurementApp-frontend\Assets\triple-beam-balance.png" alt="logo" width="150" height="100">
  </div>

  <div class="right">
    <div class="tabs">
      <span id="loginTab" class="active">LOGIN</span>
      <span id="signupTab">SIGNUP</span>
    </div>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <form id="signupForm" class="hidden">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <input type="text" id="mobile" placeholder="Mobile Number" required>
      <button type="submit">Signup</button>
    </form>
  </div>
</div>

<script src="./Js/auth.js"></script>
</body>
</html>
